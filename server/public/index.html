<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    padding: 2rem;
  }
  h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1rem;
  }
  .card {
    background: #fff;
    border-radius: 8px;
    padding: 1.25rem;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  .card h2 {
    font-size: 1rem;
    color: #666;
    margin-bottom: .75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .03em;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: .35rem 0;
    font-size: .875rem;
    border-bottom: 1px solid #f0f0f0;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: #666; }
  .stat-value { font-weight: 600; font-variant-numeric: tabular-nums; }
  .empty {
    text-align: center;
    color: #999;
    padding: 3rem;
    font-size: .9rem;
  }
  .footer {
    margin-top: .75rem;
    font-size: .75rem;
    color: #aaa;
  }
</style>
</head>
<body>
<h1>Token Tracker</h1>
<div id="app"><div class="empty">Loading...</div></div>
<script>
async function load() {
  const res = await fetch('/api/stats')
  const stats = await res.json()
  const app = document.getElementById('app')

  if (!stats.length) {
    app.innerHTML = '<div class="empty">No data yet</div>'
    return
  }

  app.innerHTML = '<div class="cards">' + stats.map(p => `
    <div class="card">
      <h2>${esc(p.project_dir)}</h2>
      <div class="stat-row">
        <span class="stat-label">Requests</span>
        <span class="stat-value">${p.requests}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Total tokens</span>
        <span class="stat-value">${fmt(p.total_tokens)}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Input tokens</span>
        <span class="stat-value">${fmt(p.input_tokens)}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Output tokens</span>
        <span class="stat-value">${fmt(p.output_tokens)}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Reasoning tokens</span>
        <span class="stat-value">${fmt(p.reasoning_tokens)}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">First usage</span>
        <span class="stat-value">${date(p.first_usage)}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Last usage</span>
        <span class="stat-value">${date(p.last_usage)}</span>
      </div>
    </div>
  `).join('') + '</div>'
}

function fmt(n) { return Number(n).toLocaleString() }
function date(d) { return new Date(d).toLocaleString() }
function esc(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]) }

load()
</script>
</body>
</html>
