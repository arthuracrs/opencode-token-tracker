<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    padding: 2rem;
  }
  h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
  .table-wrap {
    overflow-x: auto;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: .8125rem;
  }
  th, td {
    text-align: right;
    padding: .6rem .75rem;
    white-space: nowrap;
  }
  th {
    background: #fafafa;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: .03em;
    font-size: .7rem;
    border-bottom: 2px solid #e0e0e0;
    cursor: pointer;
    user-select: none;
  }
  th:first-child, td:first-child { text-align: left; }
  th.sorted-asc::after { content: ' \25B2'; }
  th.sorted-desc::after { content: ' \25BC'; }
  td { border-bottom: 1px solid #f0f0f0; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }
  td.val { font-variant-numeric: tabular-nums; }
  td.project {
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .empty {
    text-align: center;
    color: #999;
    padding: 3rem;
    font-size: .9rem;
  }
  .cost { color: #2e7d32; }
  .pricing-section {
    margin-top: 2rem;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
    padding: 1.5rem;
  }
  .pricing-section h2 { font-size: 1.1rem; margin-bottom: 1rem; }
  .pricing-section h3 { font-size: .9rem; margin: 1rem 0 .5rem; color: #555; }
  .pricing-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: .5rem;
  }
  .pricing-card {
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: .6rem .8rem;
    font-size: .75rem;
  }
  .pricing-card .name { font-weight: 600; font-size: .8rem; margin-bottom: .3rem; }
  .pricing-card .price-row { display: flex; justify-content: space-between; color: #666; }
  .calc-form {
    display: flex;
    flex-wrap: wrap;
    gap: .5rem;
    align-items: end;
    margin-top: 1rem;
  }
  .calc-form label { font-size: .75rem; color: #555; display: flex; flex-direction: column; gap: .2rem; }
  .calc-form input, .calc-form select {
    padding: .35rem .5rem;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: .8rem;
    width: 110px;
  }
  .calc-form button {
    padding: .35rem 1rem;
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: .8rem;
  }
  .calc-form button:hover { background: #1557b0; }
  .calc-result { margin-top: .8rem; font-size: .9rem; font-weight: 600; }
</style>
</head>
<body>
<h1>Token Tracker</h1>
<div id="app"><div class="empty">Loading...</div></div>
<div id="costs"></div>
<div id="pricing"></div>
<script>
let data = []
let sortKey = 'requests'
let sortDir = 'desc'

async function load() {
  const [statsRes, costsRes, pricingRes] = await Promise.all([
    fetch('/api/stats'),
    fetch('/api/costs'),
    fetch('/api/pricing'),
  ])
  data = await statsRes.json()
  const costsData = await costsRes.json()
  const pricing = await pricingRes.json()
  render()
  renderCosts(costsData)
  renderPricing(pricing)
}

function render() {
  const app = document.getElementById('app')
  if (!data.length) {
    app.innerHTML = '<div class="empty">No data yet</div>'
    return
  }

  const sorted = [...data].sort((a, b) => {
    const va = a[sortKey] ?? ''
    const vb = b[sortKey] ?? ''
    const cmp = typeof va === 'string' ? va.localeCompare(vb) : va - vb
    return sortDir === 'asc' ? cmp : -cmp
  })

  const cols = [
    { key: 'project_dir', label: 'Project', align: 'left', format: esc },
    { key: 'requests', label: 'Requests', format: v => v },
    { key: 'total_tokens', label: 'Total tokens', format: fmt },
    { key: 'input_tokens', label: 'Input', format: fmt },
    { key: 'output_tokens', label: 'Output', format: fmt },
    { key: 'reasoning_tokens', label: 'Reasoning', format: fmt },
    { key: 'cache_read', label: 'Cache read', format: fmt },
    { key: 'cache_write', label: 'Cache write', format: fmt },
    { key: 'first_usage', label: 'First usage', format: date },
    { key: 'last_usage', label: 'Last usage', format: date },
  ]

  app.innerHTML = `<div class="table-wrap"><table>
    <thead><tr>${
      cols.map(c => `<th class="${c.align === 'left' ? '' : 'val'}${sortKey === c.key ? ' sorted-' + sortDir : ''}" data-key="${c.key}">${c.label}</th>`).join('')
    }</tr></thead>
    <tbody>${
      sorted.map(p => `<tr>${
        cols.map(c => {
          const val = c.key === 'project_dir' ? c.format(p[c.key]) : c.format(p[c.key])
          const cls = c.key === 'project_dir' ? 'project' : 'val'
          return c.align === 'left' ? `<td class="${cls}">${val}</td>` : `<td class="${cls}">${val}</td>`
        }).join('')
      }</tr>`).join('')
    }</tbody>
  </table></div>`

  document.querySelectorAll('th').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.key
      if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc'
      else { sortKey = key; sortDir = 'desc' }
      render()
    })
  })
}

function renderCosts(costsData) {
  const el = document.getElementById('costs')
  const { perModel, perProject } = costsData
  const projects = Object.entries(perProject).sort((a, b) => b[1].total_cost - a[1].total_cost)

  let html = `<div class="pricing-section">
    <h2>Estimated Costs (from usage data)</h2>`

  if (!projects.length) {
    html += '<p style="color:#999;font-size:.85rem">No usage data yet.</p>'
  } else {
    html += `<div class="table-wrap"><table>
      <thead><tr>
        <th style="text-align:left">Project</th>
        <th>Requests</th>
        <th>Total tokens</th>
        <th>Estimated cost</th>
      </tr></thead>
      <tbody>`
    for (const [proj, p] of projects) {
      html += `<tr>
        <td class="project">${esc(proj)}</td>
        <td class="val">${fmt(p.requests)}</td>
        <td class="val">${fmt(p.total_tokens)}</td>
        <td class="val cost">$${p.total_cost.toFixed(4)}</td>
      </tr>`

      const models = perModel.filter(m => m.project_dir === proj)
      for (const m of models) {
        html += `<tr style="font-size:.7rem;color:#888">
          <td style="padding-left:1.5rem">${esc(m.model_id)} (${esc(m.provider_id)})</td>
          <td class="val">${fmt(m.requests)}</td>
          <td class="val">${fmt(m.total_tokens)}</td>
          <td class="val">${m.cost != null ? '$' + m.cost.toFixed(6) : '—'}</td>
        </tr>`
      }
    }
    html += `</tbody></table></div>`
  }

  html += `</div>`
  el.innerHTML = html
}

function renderPricing(pricing) {
  const el = document.getElementById('pricing')
  const providers = pricing.providers
  const prices = pricing.prices

  const modelCards = Object.entries(providers).flatMap(([provider, models]) =>
    models.map(mid => {
      const p = prices[mid]
      if (!p) return ''
      return `<div class="pricing-card">
        <div class="name">${esc(mid)} <span style="color:#999;font-weight:400">(${esc(provider)})</span></div>
        <div class="price-row"><span>Input</span><span>$${p.input.toFixed(4)}/1M</span></div>
        <div class="price-row"><span>Output</span><span>$${p.output.toFixed(4)}/1M</span></div>
        <div class="price-row"><span>Cache read</span><span>$${p.cacheRead.toFixed(4)}/1M</span></div>
        ${p.cacheWrite ? `<div class="price-row"><span>Cache write</span><span>$${p.cacheWrite.toFixed(4)}/1M</span></div>` : ''}
      </div>`
    })
  )

  el.innerHTML = `<div class="pricing-section">
    <h2>Model Pricing (Go Provider)</h2>
    <div class="pricing-grid">${modelCards.join('')}</div>
  </div>`
}

function fmt(n) { return Number(n).toLocaleString() }
function date(d) { return new Date(d).toLocaleString() }
function esc(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]) }

load()
</script>
</body>
</html>
