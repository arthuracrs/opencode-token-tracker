services:
  postgres:
    image: postgres:16-alpine
    container_name: token-tracker-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tokentracker
      POSTGRES_PASSWORD: tokentracker
      POSTGRES_DB: tokentracker
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokentracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  # To re-run later if you add new changesets, just run: docker compose up liquibase
  liquibase:
    build: ./liquibase
    volumes:
      - ./liquibase/changelog:/liquibase/changelog
    command: >
      --url=jdbc:postgresql://postgres:5432/tokentracker
      --username=tokentracker
      --password=tokentracker
      --searchPath=/liquibase/changelog
      --changeLogFile=db.changelog-master.yaml
      update
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build: ../server
    container_name: token-tracker-server
    ports:
      - "3838:3838"
    environment:
      PORT: "3838"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: tokentracker
      DB_PASSWORD: tokentracker
      DB_NAME: tokentracker
    depends_on:
      liquibase:
        condition: service_completed_successfully
    restart: unless-stopped
